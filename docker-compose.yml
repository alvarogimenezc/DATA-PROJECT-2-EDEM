# docker-compose.yml — CloudRISK local stack with GCP emulators
#
# Spins up: Firestore emulator, Pub/Sub emulator, FastAPI, React (dev), Streamlit dashboard.
# Services talk to each other over the internal `cloudrisk-net` network.
#
# Usage:
#   docker compose up --build
#
# Exposed ports:
#   8080  → API            (http://localhost:8080/api/v1/docs)
#   3000  → Frontend (Vite dev with HMR)
#   8501  → Dashboard      (Streamlit)
#   8200  → Firestore emulator (REST)
#   8085  → Pub/Sub emulator
#
# For a no-Docker fallback, see docs/QUICKSTART.md.

name: cloudrisk

services:
  firestore-emulator:
    image: google/cloud-sdk:emulators
    container_name: cloudrisk-firestore
    command: >
      gcloud emulators firestore start
      --host-port=0.0.0.0:8200
      --project=cloudrisk-local
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8200/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [cloudrisk-net]

  pubsub-emulator:
    image: google/cloud-sdk:emulators
    container_name: cloudrisk-pubsub
    command: >
      gcloud beta emulators pubsub start
      --host-port=0.0.0.0:8085
      --project=cloudrisk-local
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [cloudrisk-net]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudrisk-api
    environment:
      PROJECT_ID: cloudrisk-local
      FIRESTORE_EMULATOR_HOST: firestore-emulator:8200
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      SECRET_KEY: dev-secret-key-change-in-prod
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      firestore-emulator:
        condition: service_healthy
      pubsub-emulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 6
    networks: [cloudrisk-net]

  frontend:
    image: node:20-alpine
    container_name: cloudrisk-frontend
    working_dir: /app
    command: sh -c "npm ci --silent && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks: [cloudrisk-net]

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: cloudrisk-dashboard
    environment:
      PROJECT_ID: cloudrisk-local
      METRICS_SOURCE: local
      FIRESTORE_EMULATOR_HOST: firestore-emulator:8200
      STREAMLIT_SERVER_PORT: 8080
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
    ports:
      - "8501:8080"
    depends_on:
      firestore-emulator:
        condition: service_healthy
    networks: [cloudrisk-net]

networks:
  cloudrisk-net:
    driver: bridge

volumes:
  frontend-node-modules:
